<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#203a43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5364;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="20" fill="url(#bg)"/>
  <!-- Map grid lines -->
  <line x1="100" y1="80" x2="100" y2="380" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <line x1="250" y1="80" x2="250" y2="380" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <line x1="400" y1="80" x2="400" y2="380" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <line x1="550" y1="80" x2="550" y2="380" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <line x1="700" y1="80" x2="700" y2="380" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <line x1="100" y1="130" x2="700" y2="130" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <line x1="100" y1="230" x2="700" y2="230" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <line x1="100" y1="330" x2="700" y2="330" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <!-- Route path -->
  <path d="M200,300 Q300,300 350,220 Q400,140 500,180 Q600,220 620,160" fill="none" stroke="#00d4ff" stroke-width="3" stroke-dasharray="8,6" opacity="0.8"/>
  <!-- Car icon -->
  <circle cx="620" cy="160" r="16" fill="#00d4ff" opacity="0.3"/>
  <circle cx="620" cy="160" r="8" fill="#00d4ff"/>
  <!-- Location pin at start -->
  <circle cx="200" cy="300" r="10" fill="#ff6b6b"/>
  <circle cx="200" cy="300" r="4" fill="white"/>
  <!-- Speed indicator -->
  <rect x="520" y="280" width="160" height="70" rx="12" fill="rgba(0,0,0,0.4)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="600" y="310" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00d4ff" text-anchor="middle">85 km/h</text>
  <text x="600" y="335" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">Current Speed</text>
  <!-- Battery -->
  <rect x="120" y="280" width="120" height="70" rx="12" fill="rgba(0,0,0,0.4)" stroke="rgba(0,255,136,0.3)" stroke-width="1"/>
  <text x="180" y="310" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00ff88" text-anchor="middle">78%</text>
  <text x="180" y="335" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">Battery</text>
  <text x="400" y="440" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.95)" text-anchor="middle">Car Tracker</text>
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle">Real-Time Vehicle Tracking</text>
</svg>
