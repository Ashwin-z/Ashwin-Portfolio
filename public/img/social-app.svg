<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="20" fill="url(#bg)"/>
  <!-- Phone frame -->
  <rect x="300" y="50" width="200" height="370" rx="24" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <rect x="370" y="60" width="60" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>
  <!-- Post card inside phone -->
  <rect x="320" y="100" width="160" height="120" rx="8" fill="rgba(255,255,255,0.15)"/>
  <!-- Profile circle -->
  <circle cx="342" cy="92" r="10" fill="rgba(255,255,255,0.4)"/>
  <rect x="358" y="86" width="60" height="5" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="358" y="95" width="40" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Like/Comment icons -->
  <circle cx="338" cy="235" r="8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="362" cy="235" r="8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="386" cy="235" r="8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- More post lines -->
  <rect x="320" y="260" width="120" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="320" y="272" width="80" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  <!-- Second post preview -->
  <rect x="320" y="295" width="160" height="80" rx="8" fill="rgba(255,255,255,0.1)"/>
  <!-- Floating elements -->
  <circle cx="200" cy="150" r="30" fill="rgba(255,255,255,0.08)"/>
  <circle cx="620" cy="200" r="40" fill="rgba(255,255,255,0.06)"/>
  <circle cx="180" cy="320" r="20" fill="rgba(255,255,255,0.05)"/>
  <!-- Heart icon floating -->
  <text x="590" y="140" font-size="32" fill="rgba(255,255,255,0.3)">♥</text>
  <text x="220" y="250" font-size="24" fill="rgba(255,255,255,0.2)">💬</text>
  <text x="600" y="330" font-size="28" fill="rgba(255,255,255,0.2)">🔔</text>
  <text x="400" y="455" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.95)" text-anchor="middle">SocialSphere</text>
  <text x="400" y="485" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">Social Media Platform</text>
</svg>
